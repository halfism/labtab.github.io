---
layout: default
---

<article class="container-narrow">
  <header class="page-header">
    <h1 class="page-header__title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-header__subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="page-content post-content">
    {{ content }}
  </div>
</article>

<style>
.page-header {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid rgba(168, 139, 250, 0.15);
}

.page-header__title {
  font-size: 2.5rem;
  font-weight: 800;
}

.page-header__subtitle {
  color: #9b95b0;
  font-size: 1.125rem;
  margin-top: 0.5rem;
}
</style>
