# Site Settings
title: labtab
description: "A personal tech blog by huxiaomin — exploring code, design, and ideas."
author: huxiaomin
url: "https://halfism.github.io"
baseurl: "/labtab"
lang: zh-CN

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Sass
sass:
  style: compressed
  sass_dir: _sass

# Pagination
pagination:
  enabled: true
  per_page: 6
  permalink: "/page/:num/"
  sort_field: "date"
  sort_reverse: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2

# Excludes
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - node_modules
  - vendor

# Collections defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      toc: true
  - scope:
      path: "pages"
      type: "pages"
    values:
      layout: "page"

# Comments (Giscus)
comments:
  provider: giscus
  giscus:
    repo: "halfism/labtab"
    repo_id: "R_kgDOSgFenw"
    category: "Blog Comments"
    category_id: "DIC_kwDOSgFen84C9TPR"  # Blog Comments
    mapping: "pathname"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: "top"
    theme: "dark_dimmed"
    loading: "lazy"

# Feed
feed:
  path: feed.xml

# SEO
twitter:
  card: summary_large_image
social:
  name: huxiaomin
  links:
    - https://github.com/halfism
