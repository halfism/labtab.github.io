<header class="site-header" id="site-header">
  <nav class="nav">
    <a href="{{ '/' | relative_url }}" class="nav__logo">{{ site.title }}</a>

    <ul class="nav__links">
      {% for item in site.data.navigation %}
      <li>
        <a href="{{ item.url | relative_url }}" class="nav__link {% if page.url == item.url %}active{% endif %}">
          {{ item.title }}
        </a>
      </li>
      {% endfor %}
    </ul>

    <button class="nav__search-btn" id="search-btn" aria-label="Search">
      <i class="lucide-search" style="width:16px;height:16px;"></i>
      <kbd>Ctrl+K</kbd>
    </button>

    <button class="nav__toggle" id="nav-toggle" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <div class="nav__mobile" id="nav-mobile">
    {% for item in site.data.navigation %}
    <a href="{{ item.url | relative_url }}" class="nav__link">{{ item.title }}</a>
    {% endfor %}
  </div>
</header>
