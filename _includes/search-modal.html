<!-- Search Modal Overlay -->
<div class="search-overlay" id="search-overlay">
  <div class="search-modal">
    <div class="search-modal__header">
      <div class="search-modal__icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <input type="text" class="search-modal__input" placeholder="Search posts..." data-i18n="search.placeholder" autocomplete="off" spellcheck="false">
      <button class="search-modal__close">ESC</button>
    </div>
    <div class="search-modal__results">
      <div class="search-modal__empty" data-i18n="search.empty">Type to start searching</div>
    </div>
    <div class="search-modal__footer">
      <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> Navigate</span>
      <span><kbd>Enter</kbd> Open</span>
      <span><kbd>Esc</kbd> Close</span>
    </div>
  </div>
</div>

<!-- lunr.js CDN -->
<script src="https://unpkg.com/lunr@2.3.9/lunr.min.js"></script>
